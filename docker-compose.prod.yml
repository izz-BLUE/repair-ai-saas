# ============================================
# 生产部署
#
# 用法:
#   1. cp .env.example .env && 编辑 .env
#   2. cd frontend && npm run build
#   3. docker compose -f docker-compose.prod.yml up -d
# ============================================

services:
  mysql:
    image: mysql:8.0
    container_name: repair-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-repair_ai_saas}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: repair-redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:v1.18.0
    container_name: repair-qdrant
    restart: always
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: ./backend-java
      dockerfile: Dockerfile
    container_name: repair-backend
    restart: always
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JWT_SECRET: ${JWT_SECRET}
      DB_HOST: mysql
      DB_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-repair_ai_saas}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AI_SERVICE_URL: http://agent-python:8090
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    volumes:
      - upload_data:/app/data/uploads

  agent-python:
    build:
      context: ./agent-python
      dockerfile: Dockerfile
    container_name: repair-agent
    restart: always
    ports:
      - "127.0.0.1:${AGENT_PORT:-8090}:8090"
    environment:
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com}
      LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      QDRANT_URL: http://qdrant:6333
    depends_on:
      - qdrant

  nginx:
    image: nginx:alpine
    container_name: repair-nginx
    restart: always
    ports:
      - "${FRONTEND_PORT:-80}:80"
      - "443:443"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./deploy/nginx/repair-ai.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  mysql_data:
  redis_data:
  qdrant_data:
  upload_data:
