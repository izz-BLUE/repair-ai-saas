# ============================================
# repair-ai-saas Nginx 反向代理配置（参考模板）
#
# ⚠️ 本配置为参考模板，未经实际生产环境验证。
# 部署前请根据实际环境调整：
#   1. server_name 替换为实际域名
#   2. HTTPS 建议在宿主机 Nginx 层统一处理，勿在容器内开启 443
#      详见 docs/shared-server-deployment.md §11
#   3. X-Forwarded-For: Nginx 通过 $proxy_add_x_forwarded_for 追加真实客户端 IP
#      后端 RateLimiter.getClientIp() 取最右（最后）一个 IP，防止客户端伪造
# ============================================

server {
    listen 80;
    server_name _;  # ⚠️ 部署时替换为实际域名，例如 repair.example.com

    client_max_body_size 10M;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # 前端静态文件
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Java 后端 API 反向代理
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
    }

    # Python Agent 仅内部调用，不暴露公网
    # 如需调试（不推荐生产使用），取消以下注释：
    # location /agent/ {
    #     proxy_pass http://agent-python:8090;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }

    # ============================================
    # HTTPS / SSL 配置
    #
    # 容器内不处理 HTTPS。生产环境请在宿主机 Nginx 层统一做 SSL 终结，
    # 然后 proxy_pass http://127.0.0.1:FRONTEND_PORT
    #
    # 完整 HTTPS 方案（Let's Encrypt 自动续期、多域名）见：
    #   docs/shared-server-deployment.md §11
    # ============================================
}
