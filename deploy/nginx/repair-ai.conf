# ============================================
# repair-ai-saas Nginx 反向代理配置（参考模板）
#
# ⚠️ 本配置为参考模板，未经实际生产环境验证。
# 部署前请根据实际环境调整：
#   1. server_name 替换为实际域名
#   2. 取消 HTTPS 注释并配置 SSL 证书
#   3. 根据需要调整端口和路径
# ============================================

server {
    listen 80;
    server_name _;  # ⚠️ 部署时替换为实际域名，例如 repair.example.com

    client_max_body_size 10M;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # 前端静态文件
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Java 后端 API 反向代理
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
    }

    # Python Agent 仅内部调用，不暴露公网
    # 如需调试（不推荐生产使用），取消以下注释：
    # location /agent/ {
    #     proxy_pass http://agent-python:8090;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }

    # HTTPS 配置（部署时取消注释并配置证书路径）
    # listen 443 ssl;
    # ssl_certificate /etc/nginx/ssl/cert.pem;
    # ssl_certificate_key /etc/nginx/ssl/key.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;
    #
    # # HTTP 自动跳转 HTTPS
    # if ($scheme != "https") {
    #     return 301 https://$host$request_uri;
    # }
}
